services:
  postgres:
    image: postgres:16-alpine
    container_name: caprichito-db
    environment:
      POSTGRES_USER: caprichito
      POSTGRES_PASSWORD: caprichito123
      POSTGRES_DB: caprichito
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres-test:
    image: postgres:16-alpine
    container_name: caprichito-db-test
    environment:
      POSTGRES_USER: caprichito
      POSTGRES_PASSWORD: caprichito123
      POSTGRES_DB: caprichito_test
    ports:
      - "5433:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: caprichito-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-caprichito123}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: